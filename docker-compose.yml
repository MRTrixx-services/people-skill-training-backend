
services:

  db:
    image: postgres:16
    container_name: peopleskill_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - peopleskill_network


  redis:
    image: redis:7-alpine
    container_name: peopleskill_redis
    restart: unless-stopped

    expose:
      - "6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - peopleskill_network


  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: peopleskill_backend

    restart: unless-stopped

    command: gunicorn peopleskilltrainingapp.wsgi:application -c gunicorn.conf.py

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    networks:
      - peopleskill_network


  celery:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: peopleskill_celery

    command: celery -A peopleskilltrainingapp worker -l info

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - .:/app

    networks:
      - peopleskill_network


  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: peopleskill_celery_beat

    command: celery -A peopleskilltrainingapp beat -l info

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - .:/app

    networks:
      - peopleskill_network


volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:


networks:
  peopleskill_network:
    driver: bridge